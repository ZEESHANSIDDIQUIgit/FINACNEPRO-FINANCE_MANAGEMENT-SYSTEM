<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        html, body {
            height: 100%;
        }
 
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
        }
 
        .login-card {
            width: 100%;
            max-width: 680px;
            background: #1b1b1b;
            padding: 75px 70px;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.08);
        }
 
        .logo {
            text-align: center;
            font-size: 64px;
            margin-bottom: 18px;
        }
 
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: gold;
            font-size: 40px;
        }
 
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 50px;
            font-size: 18px;
        }
 
        input {
            width: 100%;
            padding: 22px;
            margin-bottom: 22px;
            border: none;
            border-radius: 14px;
            background: #2a2a2a;
            color: white;
            outline: none;
            font-size: 18px;
            transition: 0.3s;
        }
 
        input:focus {
            border: 1px solid gold;
            background: #222;
        }
 
        button {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 14px;
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            margin-top: 8px;
        }
 
        button:hover {
            background: #d4af37;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: #999;
            font-size: 16px;
        }

        .signup-link a {
            color: gold;
            text-decoration: none;
            font-weight: bold;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">💰</div>
        <h2>FinancePro</h2>
        <p class="subtitle">Login to manage your finances</p>
 
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>

        <div class="signup-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>
 
    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
 
            if (!email || !password) {
                alert("Please fill all fields");
                return;
            }
 
            try {
                // Changed from GET to POST to securely send password data
                const response = await fetch("http://localhost:3001/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
 
                if (response.ok && result.id) {
                    // Storing session data
                    localStorage.setItem("currentUserId", result.id);
                    localStorage.setItem("userName", result.username);
                    
                    alert("Login Successful");
                    window.location.href = "index.html";
                } else {
                    // Display specific error message from server (e.g., "User not found" or "Invalid credentials")
                    alert(result.message || "Login failed. Please check your credentials.");
                }
            } catch (error) {
                console.error("Login error:", error);
                alert("Cannot connect to server.\n\nMake sure your Node.js server (server.js) is running on port 3001.");
            }
        }

        // Allow pressing "Enter" key to login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
