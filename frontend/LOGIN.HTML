<!DOCTYPE html>               
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        html, body {
            height: 100%;
        }
 
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
        }
 
        .login-card {
            width: 100%;
            max-width: 680px;
            background: #1b1b1b;
            padding: 75px 70px;
            border-radius: 28px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.08);
        }
 
        .logo {
            text-align: center;
            font-size: 64px;
            margin-bottom: 18px;
        }
 
        h2 {
            text-align: center;
            margin-bottom: 12px;
            color: gold;
            font-size: 40px;
        }
 
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 50px;
            font-size: 18px;
        }
 
        input {
            width: 100%;
            padding: 22px;
            margin-bottom: 22px;
            border: none;
            border-radius: 14px;
            background: #2a2a2a;
            color: white;
            outline: none;
            font-size: 18px;
            transition: 0.3s;
        }
 
        input:focus {
            border: 1px solid gold;
            background: #222;
        }
 
        button {
            width: 100%;
            padding: 22px;
            border: none;
            border-radius: 14px;
            background: gold;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
            margin-top: 8px;
        }
 
        button:hover {
            background: #d4af37;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">💰</div>
        <h2>FinancePro</h2>
        <p class="subtitle">Login to manage your finances</p>
 
        <input type="email" id="email" placeholder="Enter Email">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>
 
    <script>
        async function login() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
 
            if (!email || !password) {
                alert("Please fill all fields");
                return;
            }
 
            try {
                const response = await fetch(`http://localhost:3001/api/login?email=${email}`);
                const user = await response.json();
 
                if (user.id) {
                    localStorage.setItem("currentUserId", user.id);
                    localStorage.setItem("userName", user.username);
                    alert("Login Successful");
                    window.location.href = "index.html";
                } else {
                    alert("User not found");
                }
            } catch (error) {
                console.log(error);
                alert("Cannot connect to server.\n\nMake sure node server.js is running.");
            }
        }
    </script>
</body>
</html>
